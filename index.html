<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicAlert</title>

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ff416c">

  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <div id="splash">
    <img src="/icon-512.png" class="splash-logo" />
    </div>
  <div class="app">

    <!-- HEADER -->
    <div class="header">
  <div class="left">
    <img src="/icon-512.png" class="app-logo">
    <div class="text">
      
      <div class="subtitle">Report & Track Civic Issues</div>
    </div>
  </div>

  <div class="right">
    <div class="admin-trigger" onclick="login()">👤</div>
  </div>
</div>
        <div id="adminBar">
      <span>Admin</span>
      <button onclick="logout()">Logout</button>
    </div>

    <div class="tabs" id="tabs"></div>
    <div id="issues"></div>

    <!-- FLOAT BUTTON -->
    <button class="fab" onclick="openForm()">+</button>

    <div class="modal" id="modal">
      <div class="modal-content">
        <h3>Report Issue</h3>

        <input id="title" placeholder="Title"><br>
        <select id="category"></select><br>
        <input id="location" placeholder="Location"><br>

        <button onclick="submitIssue()">Submit</button>
        <button onclick="closeForm()">Cancel</button>
      </div>
    </div>

  </div>
  
  <div id="toast"></div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="/script.js"></script>

</body>
</html>
