<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicAlert</title>

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ff416c">

   <!-- PWA support -->
   <meta name="mobile-web-app-capable" content="yes">
   <meta name="apple-mobile-web-app-capable" content="yes">
   <meta name="apple-mobile-web-app-status-bar-style" content="black">

   <link rel="apple-touch-icon" href="/icon-192.png">

  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <div id="splash">
  <h1>CivicAlert</h1>
   </div> 

  <!-- LOGO -->

  <div class="header">
  <img src="/logo.png" alt="CivicAlert" class="logo">
</div>

<p class="subtitle">
  Report & Track Civic Issue In Your Area 
  </p>

    <!-- Tabs -->
    <div class="tabs" id="tabs"></div>

    <!-- Issues -->
    <div id="issues"></div>

    <!-- Floating Button -->
    <button class="fab" onclick="openForm()">+</button>

    <!--login button-->
    <button onclick="login()" style="position:absolute;top:10px;right:10px;">
       Admin Login
      </button>

    <!-- Modal -->
    <div class="modal" id="modal">
      <div class="modal-content">
        <h3>Report Issue</h3>

        <input id="title" placeholder="Title"><br>
        <select id="category"></select><br>
        <input id="location" placeholder="Location"><br>

        <button onclick="submitIssue()">Submit</button>
        <button onclick="closeForm()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="/script.js"></script>

</body>
</html>
