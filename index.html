<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicAlert</title>

  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <!-- LOGO -->

  <div class="header">
  <img src="/logo.png" alt="CivicAlert" class="logo">
</div>

<p class="subtitle">
  Report & Track Civic Issue In Your Area 
  </p>

    <!-- Tabs -->
    <div class="tabs" id="tabs"></div>

    <!-- Issues -->
    <div id="issues"></div>

    <!-- Floating Button -->
    <button class="fab" onclick="openForm()">+</button>

    <!-- Modal -->
    <div class="modal" id="modal">
      <div class="modal-content">
        <h3>Report Issue</h3>

        <input id="title" placeholder="Title"><br>
        <select id="category"></select><br>
        <input id="location" placeholder="Location"><br>

        <button onclick="submitIssue()">Submit</button>
        <button onclick="closeForm()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="/script.js"></script>

</body>
</html>
